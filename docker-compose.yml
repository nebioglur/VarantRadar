version: '3.8'

services:
  varantradar-frontend:
    build: .
    container_name: varantradar_frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - STREAMLIT_ENV=production
    restart: unless-stopped
    depends_on:
      - varantradar-api

  varantradar-api:
    build: .
    container_name: varantradar_api
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - API_ENV=production
    restart: unless-stopped

  # İleride eklenecek Redis (Queue) ve Postgres (Enterprise DB) servisleri
  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"
